<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bøger – Polyteknisk Boghandel</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Product page specifics */
    .active-filter {
      background: var(--brand-primary) !important;
      border-color: var(--brand-primary) !important;
      color: white !important;
    }
    .filter-tag {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--brand-primary); color: white;
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      cursor: pointer;
    }
    .filter-tag:hover { background: var(--brand-secondary); }
    #products-grid .col { transition: opacity 0.2s; }
    .no-results { text-align:center; padding:60px 20px; color:var(--poly-text-muted); }
    .no-results .icon { font-size:3rem; }

    /* Detail panel */
    #detail-panel {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1050;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #detail-panel.open { display: flex; }
    #detail-box {
      background: white;
      max-width: 700px;
      width: 95%;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 4px;
      box-shadow: 0 16px 64px rgba(0,0,0,0.25);
      position: relative;
    }
    #detail-close {
      position: sticky; top: 12px;
      float: right; margin: 12px 12px 0 0;
      background: var(--poly-navy); color: white;
      border: none; border-radius: 50%;
      width: 32px; height: 32px;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .detail-img {
      max-height: 260px;
      object-fit: contain;
      width: 100%;
      padding: 16px;
      background: var(--poly-warm-gray);
    }
    .detail-body { padding: 24px 28px; }
    .detail-title { font-family: var(--font-display); font-size: 1.4rem; color: var(--poly-navy); }
    .detail-price { font-family: var(--font-display); font-size: 1.6rem; color: var(--poly-red); font-weight: 700; }
    .detail-meta td { font-size: 13px; padding: 3px 16px 3px 0; }
    .detail-meta td:first-child { color: var(--poly-text-muted); font-weight: 500; width: 110px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="header-mount"></div>

  <!-- ============================================================
       BREADCRUMB + PAGE TITLE
       ============================================================ -->
  <div style="background:var(--poly-warm-gray); border-bottom:1px solid var(--poly-border);">
    <div class="container">
      <div class="poly-breadcrumb">
        <a href="index.html">Hjem</a>
        <span class="sep">›</span>
        <span id="bc-category">Alle bøger</span>
      </div>
    </div>
  </div>

  <main class="container py-4">
    <div class="row g-4">

      <!-- ============================================================
           LEFT SIDEBAR — Filters
           ============================================================ -->
      <div class="col-lg-3 d-none d-lg-block">

        <!-- Active filters -->
        <div id="active-filters" class="mb-3" style="display:none!important;"></div>

        <div class="filter-sidebar mb-3">
          <h6>Kategori</h6>
          <div class="filter-check">
            <label><input type="checkbox" class="cat-filter" value="students"> Studerende</label>
          </div>
          <div class="filter-check">
            <label><input type="checkbox" class="cat-filter" value="engineering"> Ingeniørvidenskab</label>
          </div>
          <div class="filter-check">
            <label><input type="checkbox" class="cat-filter" value="building"> Byggeri</label>
          </div>
          <div class="filter-check">
            <label><input type="checkbox" class="cat-filter" value="it"> IT & Programmering</label>
          </div>
          <div class="filter-check">
            <label><input type="checkbox" class="cat-filter" value="science"> Naturvidenskab</label>
          </div>
          <div class="filter-check">
            <label><input type="checkbox" class="cat-filter" value="management"> Ledelse</label>
          </div>
          <div class="filter-check">
            <label><input type="checkbox" class="cat-filter" value="popular"> Populærvidenskab</label>
          </div>
          <div class="filter-check">
            <label><input type="checkbox" class="cat-filter" value="leisure"> Fritid</label>
          </div>
        </div>

        <div class="filter-sidebar mb-3">
          <h6>Pris</h6>
          <div class="mb-2">
            <input type="range" class="form-range" id="price-range" min="0" max="700" value="700" step="10"
                   style="accent-color:var(--poly-red);">
            <div class="d-flex justify-content-between" style="font-size:12px; color:var(--poly-text-muted);">
              <span>0 kr.</span>
              <span>Max: <strong id="price-label">700</strong> kr.</span>
            </div>
          </div>
        </div>

        <div class="filter-sidebar mb-3">
          <h6>Tags</h6>
          <div class="d-flex flex-wrap gap-1">
            <button class="tag-filter-btn filter-tag" data-tag="New">New</button>
            <button class="tag-filter-btn filter-tag" data-tag="Bestseller">Bestseller</button>
            <button class="tag-filter-btn filter-tag" data-tag="SBI">SBI</button>
            <button class="tag-filter-btn filter-tag" data-tag="Study">Study</button>
            <button class="tag-filter-btn filter-tag" data-tag="Hot">Hot</button>
            <button class="tag-filter-btn filter-tag" data-tag="Classic">Classic</button>
          </div>
        </div>

        <div class="filter-sidebar">
          <h6>År</h6>
          <div class="filter-check"><label><input type="checkbox" class="year-filter" value="2025"> 2025</label></div>
          <div class="filter-check"><label><input type="checkbox" class="year-filter" value="2024"> 2024</label></div>
          <div class="filter-check"><label><input type="checkbox" class="year-filter" value="2023"> 2023</label></div>
          <div class="filter-check"><label><input type="checkbox" class="year-filter" value="2022"> 2022 og ældre</label></div>
        </div>
      </div>

      <!-- ============================================================
           RIGHT — Product Grid
           ============================================================ -->
      <div class="col-lg-9">

        <!-- Toolbar -->
        <div class="product-toolbar">
          <div style="font-size:13px; color:var(--poly-text-muted);">
            Viser <strong id="result-count">0</strong> bøger
          </div>
          <div class="d-flex align-items-center gap-3 flex-wrap">
            <!-- Mobile filter toggle -->
            <button class="btn btn-sm btn-outline-secondary d-lg-none" type="button"
                    data-bs-toggle="offcanvas" data-bs-target="#mobileFilters">
              🔧 Filtrér
            </button>
            <div class="d-flex align-items-center gap-2">
              <label style="font-size:13px; white-space:nowrap;" data-i18n="product.sort">Sortér:</label>
              <select id="sort-select">
                <option value="default">Standard</option>
                <option value="price-asc">Pris: lav → høj</option>
                <option value="price-desc">Pris: høj → lav</option>
                <option value="title">Titel A–Å</option>
                <option value="year">Nyeste først</option>
              </select>
            </div>
            <div class="view-toggle d-flex">
              <button id="grid-view-btn" class="active" title="Grid view">⊞</button>
              <button id="list-view-btn" title="List view">☰</button>
            </div>
          </div>
        </div>

        <!-- Products -->
        <div id="products-grid" class="row row-cols-2 row-cols-md-3 row-cols-xl-4 g-3">
          <!-- Rendered by JS -->
        </div>

        <!-- No results -->
        <div id="no-results" class="no-results" style="display:none;">
          <div class="icon">📭</div>
          <h5 class="mt-3" style="font-family:var(--font-display);">Ingen bøger fundet</h5>
          <p style="font-size:14px;">Prøv at ændre dine filtre eller søg på noget andet.</p>
          <button class="btn-hero" onclick="clearAllFilters()">Nulstil filtre</button>
        </div>

      </div>
    </div>
  </main>

  <!-- ============================================================
       MOBILE FILTER OFFCANVAS
       ============================================================ -->
  <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileFilters" style="max-width:300px;">
    <div class="offcanvas-header" style="background:var(--poly-navy);color:white;">
      <h5 class="offcanvas-title" style="font-family:var(--font-display);">🔧 Filtrér</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-3">
      <h6 class="text-uppercase" style="font-size:11px;letter-spacing:.08em;color:var(--poly-text-muted);">Kategori</h6>
      <div id="mobile-cat-filters">
        <!-- Cloned from desktop by JS -->
      </div>
      <hr>
      <h6 class="text-uppercase" style="font-size:11px;letter-spacing:.08em;color:var(--poly-text-muted);">Maks. pris</h6>
      <input type="range" class="form-range" id="price-range-mobile" min="0" max="700" value="700" step="10"
             style="accent-color:var(--poly-red);">
      <div style="font-size:12px;">Max: <strong id="price-label-mobile">700</strong> kr.</div>
      <div class="mt-3">
        <button class="btn-hero w-100" data-bs-dismiss="offcanvas">Anvend filtre</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       BOOK DETAIL PANEL (lightbox style)
       ============================================================ -->
  <div id="detail-panel">
    <div id="detail-box">
      <button id="detail-close" onclick="closeDetail()">×</button>
      <img id="detail-img" src="" alt="" class="detail-img">
      <div class="detail-body">
        <h2 class="detail-title" id="detail-title"></h2>
        <p style="color:var(--poly-text-muted); font-size:14px;" id="detail-author"></p>
        <div class="detail-price" id="detail-price"></div>
        <table class="detail-meta my-3">
          <tr><td>ISBN</td><td id="detail-isbn"></td></tr>
          <tr><td>Forlag</td><td id="detail-publisher"></td></tr>
          <tr><td>Sider</td><td id="detail-pages"></td></tr>
          <tr><td>Udgivelsesår</td><td id="detail-year"></td></tr>
        </table>
        <p style="font-size:14px; line-height:1.7; color:var(--poly-text-muted);" id="detail-desc"></p>
        <div class="d-flex gap-2 mt-3">
          <button class="btn-add-cart flex-grow-1" id="detail-add-btn" style="padding:12px;">
            🛒 Læg i kurv
          </button>
          <button class="btn-hero-outline" style="border-color:var(--brand-primary);color:var(--brand-primary);"
                  onclick="closeDetail()">Tilbage</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="scanner-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content scanner-modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Scan book barcode</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="scanner-stage">
            <video id="scanner-video" autoplay playsinline muted></video>
            <div class="scanner-frame"></div>
            <div id="scanner-status" class="scanner-status">Camera ready</div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-hero-outline" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer-mount"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="data.js"></script>
  <script src="partials.js"></script>
  <script src="cart.js"></script>
  <script src="main.js"></script>
  <script>
    /* =====================
       Product Page Logic
       ===================== */

    let currentView = 'grid'; // 'grid' | 'list'
    let activeTags = [];
    let maxPrice = 700;
    let activeYears = [];

    // Read URL param ?cat=
    const urlCat = new URLSearchParams(location.search).get('cat') || '';
    const urlQ   = new URLSearchParams(location.search).get('q') || '';

    if (urlCat) {
      // Pre-check the matching filter checkbox
      document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.cat-filter').forEach(cb => {
          if (cb.value === urlCat) cb.checked = true;
        });
        // Update breadcrumb
        const catNames = {
          dtu:'DTU', zealand:'Zealand', ek:'Erhvervsakademi', engineering:'Ingeniørvidenskab',
          building:'Byggeri', it:'IT & Programmering', management:'Ledelse',
          science:'Naturvidenskab', popular:'Populærvidenskab', leisure:'Fritid',
          ebooks:'Digitale bøger', students:'Studerende'
        };
        const bcEl = document.getElementById('bc-category');
        if (bcEl && catNames[urlCat]) bcEl.textContent = catNames[urlCat];
      });
    }

    if (urlQ) {
      document.addEventListener('DOMContentLoaded', () => {
        const si = document.getElementById('search-input');
        if (si) si.value = urlQ;
        const bcEl = document.getElementById('bc-category');
        if (bcEl) bcEl.textContent = `Søgning: "${urlQ}"`;
      });
    }

    /* ---- Filtering & Sorting ---- */
    function getFilteredBooks() {
      const checkedCats = [...document.querySelectorAll('.cat-filter:checked')].map(c => c.value);
      const checkedYears = [...document.querySelectorAll('.year-filter:checked')].map(c => parseInt(c.value));
      const searchVal = (document.getElementById('search-input')?.value || urlQ || '').toLowerCase();

      return BOOKS
        .filter(b => {
          // Category
          if (checkedCats.length && !checkedCats.some(c => b.category.includes(c))) return false;
          // Price
          if (b.price > maxPrice) return false;
          // Tags
          if (activeTags.length && !activeTags.some(t => b.tags.includes(t))) return false;
          // Year
          if (checkedYears.length) {
            const yr = b.year;
            const matches = checkedYears.some(y => y === 2022 ? yr <= 2022 : yr === y);
            if (!matches) return false;
          }
          // Search
          if (searchVal) {
            const haystack = `${b.title} ${b.author} ${b.isbn} ${b.publisher}`.toLowerCase();
            if (!haystack.includes(searchVal)) return false;
          }
          return true;
        });
    }

    function getSortedBooks(books) {
      const sort = document.getElementById('sort-select')?.value || 'default';
      return [...books].sort((a, b) => {
        if (sort === 'price-asc') return a.price - b.price;
        if (sort === 'price-desc') return b.price - a.price;
        if (sort === 'title') return a.title.localeCompare(b.title, 'da');
        if (sort === 'year') return b.year - a.year;
        return 0;
      });
    }

    function renderProducts() {
      const filtered = getFilteredBooks();
      const sorted = getSortedBooks(filtered);
      const grid = document.getElementById('products-grid');
      const noRes = document.getElementById('no-results');
      const countEl = document.getElementById('result-count');
      if (countEl) countEl.textContent = sorted.length;

      if (!sorted.length) {
        grid.innerHTML = '';
        noRes.style.display = 'block';
        return;
      }
      noRes.style.display = 'none';

      const isGrid = currentView === 'grid';

      if (isGrid) {
        grid.className = 'row row-cols-2 row-cols-md-3 row-cols-xl-4 g-3';
        grid.innerHTML = sorted.map(b => `
          <div class="col">
            <div class="book-card h-100" onclick="openDetail(${b.id})" style="cursor:pointer;">
              <div class="book-card-img">
                <img src="${b.img}" alt="${b.title}" loading="lazy"
                     onerror="this.src='https://via.placeholder.com/160x210/f2ede8/1c1c1c?text=Book'">
              </div>
              <div class="book-card-body">
                <div class="mb-1">${b.tags.map(t => `<span class="badge me-1" style="background:var(--brand-primary);font-size:10px;">${t}</span>`).join('')}</div>
                <div class="book-card-title">${b.title}</div>
                <div class="book-card-author">${b.author}</div>
                <div class="book-card-price">${fmtPrice(b.price)}</div>
                <button class="btn-add-cart" onclick="event.stopPropagation();addToCart(BOOKS.find(x=>x.id===${b.id}))">
                  🛒 <span>Læg i kurv</span>
                </button>
              </div>
            </div>
          </div>`).join('');
      } else {
        // List view
        grid.className = 'row g-2';
        grid.innerHTML = sorted.map(b => `
          <div class="col-12">
            <div class="book-card list-view" onclick="openDetail(${b.id})" style="cursor:pointer;">
              <div class="book-card-img" style="width:90px;min-width:90px;height:auto;">
                <img src="${b.img}" alt="${b.title}" loading="lazy" style="max-height:120px;"
                     onerror="this.src='https://via.placeholder.com/80x110/f2ede8/1c1c1c?text=Book'">
              </div>
              <div class="book-card-body flex-row flex-wrap align-items-center" style="padding:14px;">
                <div class="flex-grow-1 me-3">
                  <div style="font-size:10px; margin-bottom:4px;">${b.tags.map(t => `<span class="badge me-1" style="background:var(--brand-primary);">${t}</span>`).join('')}</div>
                  <div class="book-card-title" style="-webkit-line-clamp:1;">${b.title}</div>
                  <div class="book-card-author">${b.author} · ${b.publisher} · ${b.year}</div>
                </div>
                <div class="d-flex align-items-center gap-3" style="min-width:160px;">
                  <div class="book-card-price mb-0">${fmtPrice(b.price)}</div>
                  <button class="btn-add-cart" style="width:auto;padding:7px 14px;"
                          onclick="event.stopPropagation();addToCart(BOOKS.find(x=>x.id===${b.id}))">
                    🛒 Læg i kurv
                  </button>
                </div>
              </div>
            </div>
          </div>`).join('');
      }
    }

    /* ---- Event wires ---- */
    document.addEventListener('DOMContentLoaded', () => {
      renderProducts();

      // Sort
      document.getElementById('sort-select')?.addEventListener('change', renderProducts);

      // Category filters
      document.querySelectorAll('.cat-filter, .year-filter').forEach(cb => {
        cb.addEventListener('change', renderProducts);
      });

      // Price range
      const pr = document.getElementById('price-range');
      const pl = document.getElementById('price-label');
      if (pr) {
        pr.addEventListener('input', () => {
          maxPrice = parseInt(pr.value);
          if (pl) pl.textContent = pr.value;
          // Sync mobile
          const prm = document.getElementById('price-range-mobile');
          if (prm) prm.value = pr.value;
          document.getElementById('price-label-mobile').textContent = pr.value;
          renderProducts();
        });
      }
      // Mobile price range
      const prm = document.getElementById('price-range-mobile');
      if (prm) {
        prm.addEventListener('input', () => {
          maxPrice = parseInt(prm.value);
          document.getElementById('price-label-mobile').textContent = prm.value;
          if (pr) pr.value = prm.value;
          if (pl) pl.textContent = prm.value;
          renderProducts();
        });
      }

      // Tag filters
      document.querySelectorAll('.tag-filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tag = btn.dataset.tag;
          if (activeTags.includes(tag)) {
            activeTags = activeTags.filter(t => t !== tag);
            btn.classList.remove('active-filter');
          } else {
            activeTags.push(tag);
            btn.classList.add('active-filter');
          }
          renderProducts();
        });
      });

      // View toggle
      document.getElementById('grid-view-btn').addEventListener('click', () => {
        currentView = 'grid';
        document.getElementById('grid-view-btn').classList.add('active');
        document.getElementById('list-view-btn').classList.remove('active');
        renderProducts();
      });
      document.getElementById('list-view-btn').addEventListener('click', () => {
        currentView = 'list';
        document.getElementById('list-view-btn').classList.add('active');
        document.getElementById('grid-view-btn').classList.remove('active');
        renderProducts();
      });
    });

    function clearAllFilters() {
      document.querySelectorAll('.cat-filter, .year-filter').forEach(cb => cb.checked = false);
      activeTags = [];
      maxPrice = 700;
      const pr = document.getElementById('price-range');
      if (pr) pr.value = 700;
      const pl = document.getElementById('price-label');
      if (pl) pl.textContent = 700;
      document.querySelectorAll('.tag-filter-btn').forEach(b => b.classList.remove('active-filter'));
      renderProducts();
    }

    /* ---- Book detail panel ---- */
    function openDetail(id) {
      const b = BOOKS.find(x => x.id === id);
      if (!b) return;
      document.getElementById('detail-img').src = b.img;
      document.getElementById('detail-title').textContent = b.title;
      document.getElementById('detail-author').textContent = b.author;
      document.getElementById('detail-price').textContent = fmtPrice(b.price);
      document.getElementById('detail-isbn').textContent = b.isbn;
      document.getElementById('detail-publisher').textContent = b.publisher;
      document.getElementById('detail-pages').textContent = b.pages;
      document.getElementById('detail-year').textContent = b.year;
      document.getElementById('detail-desc').textContent = b.description;
      document.getElementById('detail-add-btn').onclick = () => {
        addToCart(b);
        closeDetail();
      };
      document.getElementById('detail-panel').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDetail() {
      document.getElementById('detail-panel').classList.remove('open');
      document.body.style.overflow = '';
    }

    // Close on backdrop click
    document.getElementById('detail-panel').addEventListener('click', function (e) {
      if (e.target === this) closeDetail();
    });
    // Close on Escape
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });
  </script>
</body>
</html>
